# Finmint configuration
# Copy this to ~/.finmint/config.yaml and fill in your values

teller:
  # Path to your Teller mTLS certificate and private key
  # Download from https://teller.io/settings/certificates
  cert_path: /path/to/certificate.pem
  key_path: /path/to/private_key.pem
  # Environment: "sandbox" or "production"
  environment: sandbox
  # Your Teller application ID (from https://teller.io/settings)
  application_id: your_application_id

claude:
  # Name of the environment variable containing your Anthropic API key
  # Set this env var before running finmint (e.g., export ANTHROPIC_API_KEY=sk-...)
  api_key_env: ANTHROPIC_API_KEY
